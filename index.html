<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Teatrino de títeres · para Adriana</title>

<!-- Tipografías: Fraunces (serif cálido) + Nunito (redondeada).
     Sin internet cae a Georgia / system-ui sin romperse. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  /* Paleta atardecer */
  --sky-1:#241a3a; --sky-2:#3a2350; --sky-3:#6e2f5e; --sky-4:#b8455f;
  --sky-5:#e86a4b; --sky-6:#f6a552; --sky-7:#ffd089;
  --wood-1:#8a5a33; --wood-2:#6e4526; --wood-3:#59371e;
  --gold:#e9c46a;
  --text:#fff4e6; --text-soft:#ffd6a3;
  /* Títeres (cada títere puede redefinir sus variables) */
  --ink:#43302b; --skin:#ffe0c7; --outfit:#e07a5f; --hair:#4a2f2a;
  --string:rgba(255,240,214,.55);
  --serif:'Fraunces','Georgia','Times New Roman',serif;
  --round:'Nunito',ui-rounded,'Segoe UI',system-ui,-apple-system,sans-serif;
}

*{ box-sizing:border-box; }
html,body{ height:100%; margin:0; overflow:hidden; }
body{
  background:var(--sky-1);
  font-family:var(--round);
  color:var(--text);
  -webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased;
  user-select:none;
}

/* ===================== TEATRINO ===================== */
.theater{ position:fixed; inset:0; min-height:100dvh; overflow:hidden; background:var(--sky-1); }

/* ------- Fondo ------- */
.backdrop{ position:absolute; inset:0; overflow:hidden; z-index:1; }
.sky{
  position:absolute; inset:0;
  background:linear-gradient(180deg,
    var(--sky-1) 0%, var(--sky-2) 17%, var(--sky-3) 36%,
    var(--sky-4) 56%, var(--sky-5) 73%, var(--sky-6) 88%, var(--sky-7) 100%);
}
.sun-glow{
  position:absolute; left:50%; bottom:4%;
  width:clamp(260px,62vmin,600px); aspect-ratio:1;
  transform:translateX(-50%); border-radius:50%;
  background:radial-gradient(circle,
    rgba(255,222,150,.55) 0%, rgba(255,190,120,.24) 36%, rgba(255,170,110,0) 68%);
  animation:sunPulse 8s ease-in-out infinite; will-change:opacity,transform;
}
.sun-core{
  position:absolute; left:50%; bottom:14%;
  width:clamp(120px,26vmin,240px); aspect-ratio:1;
  transform:translateX(-50%); border-radius:50%;
  background:radial-gradient(circle at 50% 44%, #fff6d8 0%, #ffdd92 55%, #ffca79 100%);
}
@keyframes sunPulse{
  0%,100%{ opacity:.78; transform:translateX(-50%) scale(1); }
  50%{ opacity:1; transform:translateX(-50%) scale(1.05); }
}
.hills{ position:absolute; left:0; bottom:clamp(70px,14vh,140px); width:100%; height:26%; }
.hills svg{ display:block; width:100%; height:100%; }

/* Tarima de madera */
.floor{
  position:absolute; left:0; bottom:0; width:100%;
  height:clamp(70px,14vh,140px);
  background:
    repeating-linear-gradient(90deg, rgba(0,0,0,.12) 0 2px, rgba(0,0,0,0) 2px 64px),
    linear-gradient(180deg,var(--wood-2) 0%, var(--wood-3) 100%);
  box-shadow:inset 0 3px 0 rgba(255,205,150,.28), inset 0 14px 22px rgba(0,0,0,.25);
  z-index:2;
}
.spotlight{
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:80%; height:100%;
  background:linear-gradient(180deg, rgba(255,244,214,.20), rgba(255,244,214,0) 70%);
  clip-path:polygon(40% 0, 60% 0, 86% 100%, 14% 100%);
  mix-blend-mode:screen; pointer-events:none;
}
.warmth{
  position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(circle at 50% 60%, rgba(255,204,140,.38), rgba(255,150,90,0) 60%);
  opacity:0; transition:opacity 1.3s ease;
}
.scene.finale .warmth{ opacity:1; }

.mote{
  position:absolute; bottom:-6%; border-radius:50%;
  background:radial-gradient(circle,#ffe9b0,rgba(255,210,120,0) 70%);
  opacity:0; pointer-events:none;
  animation:moteRise linear infinite; will-change:transform,opacity;
}
@keyframes moteRise{
  0%{ transform:translate(0,0); opacity:0; }
  12%{ opacity:.8; }
  88%{ opacity:.55; }
  100%{ transform:translate(var(--dx,10px),-94vh); opacity:0; }
}

/* ===================== CONTENIDO ===================== */
.content{ position:absolute; inset:0; z-index:10; height:100%; display:flex; flex-direction:column; }
.scene{ flex:1 1 auto; position:relative; min-height:0; }
.fx{ position:absolute; inset:0; z-index:15; pointer-events:none; }

/* ------- Los dos títeres + micrófono ------- */
.performers{
  position:absolute; left:50%; bottom:clamp(58px,12.5vh,128px);
  transform:translateX(-50%);
  display:flex; align-items:flex-end;
  z-index:14;
}
.mic{
  height:clamp(120px,30vmin,220px); width:auto;
  margin:0 clamp(-30px,-6vmin,-10px);
  transform:translateY(-2%);
  flex:0 0 auto;
}
.mic svg{ display:block; height:100%; width:auto; }

/* Aparejo de cada marioneta (cruceta + hilos + muñeco) */
.puppet-rig{
  position:relative;
  width:clamp(128px,35vmin,258px);
  transform:translateY(-125vh);
  transition:transform 2.4s cubic-bezier(.3,1.18,.35,1);
  will-change:transform;
  flex:0 0 auto;
}
.puppet-rig.entered{ transform:translateY(0); }
.puppet-rig.no-anim{ transition:none !important; }

/* Adriana: sus colores (vestido y pelo) — el mismo esqueleto CSS aplica */
.puppet-b{ --outfit:#5f9c8f; --hair:#2e211d; }

/* Balanceo colgado de la cruceta; el títere B va a contratiempo */
.rig-sway{
  transform-origin:50% 0%;
  animation:sway 4.6s ease-in-out infinite;
  will-change:transform;
}
.puppet-b .rig-sway{ animation-delay:-2.3s; }
@keyframes sway{
  0%,100%{ transform:rotate(1.4deg); }
  50%{ transform:rotate(-1.4deg); }
}
.puppet-rig.landing .rig-sway{ animation:swayBig 1.1s ease-in-out 2, sway 4.6s ease-in-out 2.2s infinite; }
@keyframes swayBig{
  0%,100%{ transform:rotate(3.4deg); }
  50%{ transform:rotate(-3.4deg); }
}

.shadow{
  position:absolute; left:50%; bottom:-1.5%;
  width:70%; height:6%;
  transform:translateX(-50%);
  background:radial-gradient(ellipse at center, rgba(30,10,20,.42), rgba(30,10,20,0) 70%);
  border-radius:50%;
}
.puppet-svg{ display:block; width:100%; height:auto; overflow:visible; }

/* ---- Piezas compartidas ---- */
.crossbar{ fill:var(--wood-1); stroke:var(--wood-3); stroke-width:3; }
.crossbar-knob{ fill:var(--wood-2); stroke:var(--wood-3); stroke-width:2.5; }
.string{ stroke:var(--string); stroke-width:2; fill:none; }
.head,.neck{ fill:var(--skin); stroke:var(--ink); stroke-width:6; }
.hair{ fill:var(--hair); }
.outfit{ fill:var(--outfit); stroke:var(--ink); stroke-width:6; stroke-linejoin:round; }
.seam{ stroke:rgba(67,48,43,.5); stroke-width:3; stroke-dasharray:2 7; stroke-linecap:round; fill:none; }
.limb-ink{ stroke:var(--ink); stroke-width:16; stroke-linecap:round; fill:none; }
.limb-skin{ stroke:var(--skin); stroke-width:10; stroke-linecap:round; fill:none; }
.joint{ fill:var(--wood-1); stroke:var(--ink); stroke-width:3.5; }
.shoe{ fill:var(--wood-2); stroke:var(--ink); stroke-width:4; }
.specs circle{ fill:none; stroke:var(--ink); stroke-width:4; }
.specs line{ stroke:var(--ink); stroke-width:4; stroke-linecap:round; }
.brows path{ stroke:var(--ink); stroke-width:4.5; stroke-linecap:round; fill:none; }
.eyes circle{ fill:var(--ink); }
.eyes path{ stroke:var(--ink); stroke-width:5; stroke-linecap:round; fill:none; }
.blush{ fill:rgba(224,122,95,.4); }
.mouth{ stroke:var(--ink); stroke-width:6; stroke-linecap:round; fill:none; }
.m-grin{ fill:var(--ink); stroke:none; }
.sweat{ fill:#bfe6ff; stroke:#7fb8e0; stroke-width:1.5; }
.fly-heart{ fill:#ff5d73; }

.eyes,.mouth,.sweat,.fly-heart{ opacity:0; transition:opacity .3s ease; }

/* Ejes (coordenadas del viewBox 0 0 220 430) */
.brows{ transform-box:view-box; transform-origin:110px 132px; transition:transform .3s ease; }
.head-tilt{ transform-box:view-box; transform-origin:110px 200px; transition:transform .4s ease; }
.arm{ transform-box:view-box; transition:transform .4s ease; }
.arm-left{ transform-origin:76px 218px; animation:dangleA 4.6s ease-in-out infinite; }
.arm-right{ transform-origin:144px 218px; animation:dangleB 4.6s ease-in-out infinite; }
.leg{ transform-box:view-box; }
.leg-left{ transform-origin:96px 300px; animation:dangleB 5.4s ease-in-out infinite; }
.leg-right{ transform-origin:124px 300px; animation:dangleA 5.4s ease-in-out infinite; }
.fly-heart{ transform-box:view-box; transform-origin:110px 235px; }
.sweat{ transform-box:view-box; }

@keyframes dangleA{ 0%,100%{ transform:rotate(4.5deg);} 50%{ transform:rotate(-4.5deg);} }
@keyframes dangleB{ 0%,100%{ transform:rotate(-4.5deg);} 50%{ transform:rotate(4.5deg);} }

/* ---- Ánimos (aplican al títere que tenga ese data-mood) ---- */
.character[data-mood="curious"] .eyes-open,
.character[data-mood="warm"] .eyes-open,
.character[data-mood="sincere"] .eyes-open,
.character[data-mood="sheepish"] .eyes-open{ opacity:1; }
.character[data-mood="celebrate"] .eyes-happy,
.character[data-mood="laugh"] .eyes-happy,
.character[data-mood="grateful"] .eyes-happy,
.character[data-mood="heart"] .eyes-happy,
.character[data-mood="joy"] .eyes-happy{ opacity:1; }
.character[data-mood="playful"] .eyes-wink{ opacity:1; }

.character[data-mood="curious"] .m-smile,
.character[data-mood="warm"] .m-smile,
.character[data-mood="sincere"] .m-smile{ opacity:1; }
.character[data-mood="playful"] .m-smirk{ opacity:1; }
.character[data-mood="celebrate"] .m-grin,
.character[data-mood="laugh"] .m-grin,
.character[data-mood="joy"] .m-grin{ opacity:1; }
.character[data-mood="grateful"] .m-soft,
.character[data-mood="heart"] .m-soft{ opacity:1; }
.character[data-mood="sheepish"] .m-squig{ opacity:1; }

/* Cabecita ladeada */
.character[data-mood="curious"] .head-tilt{ transform:rotate(-4deg); }
.character[data-mood="curious"] .brows{ transform:translateY(-3px); }
.character[data-mood="playful"] .head-tilt{ transform:rotate(4deg); }
.character[data-mood="laugh"] .head-tilt{ transform:rotate(5deg); }
.character[data-mood="grateful"] .head-tilt{ transform:rotate(-3deg); }
.character[data-mood="sheepish"] .head-tilt{ transform:rotate(5deg) translateY(3px); }
.character[data-mood="heart"] .head-tilt{ transform:rotate(-3deg); }

/* Gotita de pena */
@keyframes drip{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(3px);} }
.character[data-mood="sheepish"] .sweat{ opacity:1; animation:drip 1.3s ease-in-out infinite; }

/* Mano al corazón (el hilo del brazo acompaña porque va en el mismo grupo) */
.character[data-mood="heart"] .arm-left{ animation:none; transform:rotate(58deg); }
@keyframes heartFloat{
  0%{ opacity:0; transform:translate(0,0) scale(.6);}
  22%{ opacity:1;}
  100%{ opacity:0; transform:translate(4px,-72px) scale(1.12);}
}
.character[data-mood="heart"] .fly-heart{ animation:heartFloat 1.8s ease-out forwards; }

/* Festejo: los dos brazos arriba */
.character[data-mood="celebrate"] .arm-left{ animation:none; transform:rotate(148deg); }
.character[data-mood="celebrate"] .arm-right{ animation:none; transform:rotate(-148deg); }

/* Risa: manitas a la barriga */
.character[data-mood="laugh"] .arm-left{ animation:none; transform:rotate(34deg); }
.character[data-mood="laugh"] .arm-right{ animation:none; transform:rotate(-34deg); }

/* Saludo final + brinquitos de la cruceta */
@keyframes wave{ 0%,100%{ transform:rotate(-146deg);} 50%{ transform:rotate(-170deg);} }
.character[data-mood="joy"] .arm-right{ animation:wave .7s ease-in-out infinite; }
@keyframes hop{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-7px);} }
.character[data-mood="joy"] .rig-sway{ animation:sway 4.6s ease-in-out infinite, hop 1.4s ease-in-out infinite; }
.puppet-b[data-mood="joy"] .rig-sway{ animation-delay:-2.3s, -.7s; }

/* ---- Utilería (pastel y regalo) ---- */
.prop{
  position:absolute; left:50%; bottom:0; z-index:16;
  width:clamp(58px,13vmin,104px);
  margin-left:calc(clamp(58px,13vmin,104px) / -2);
  opacity:0; transform:translateY(14px) scale(.7);
  transition:opacity .4s ease, transform .45s cubic-bezier(.34,1.5,.5,1);
  pointer-events:none; will-change:transform,opacity;
}
.prop.show{ opacity:1; transform:translateY(0) scale(1); }
.prop svg{ display:block; width:100%; height:auto; }

/* ===================== TEXTO ===================== */
.caption-band{
  flex:0 0 auto; min-height:21vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:1vh; padding:1.4vh 6vw; position:relative; z-index:20; text-align:center;
}
.caption{
  max-width:26ch;
  font-family:var(--serif);
  font-weight:500; line-height:1.34;
  font-size:clamp(1.12rem,4.4vw,2rem);
  color:var(--text);
  text-shadow:0 2px 14px rgba(40,10,20,.55);
  text-wrap:balance;
  opacity:0; transform:translateY(15px);
  transition:opacity .34s ease, transform .34s ease;
  will-change:opacity,transform;
}
.caption.show{ opacity:1; transform:none; }
.caption.final{
  font-size:clamp(1.55rem,6.4vw,3rem);
  font-weight:600;
  background:linear-gradient(92deg,#ffe0a8,#ffb37a 55%,#ff9d8a);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:transparent;
  text-shadow:none;
}
.signature{
  font-family:var(--serif); font-style:italic;
  font-size:clamp(1rem,3.6vw,1.4rem);
  color:var(--text-soft); letter-spacing:.04em;
  opacity:0; transform:translateY(8px);
  transition:opacity .55s ease .25s, transform .55s ease .25s;
}
.signature.show{ opacity:1; transform:none; }

/* ===================== CONTROLES ===================== */
.controls{
  flex:0 0 auto;
  display:flex; flex-direction:column; align-items:center; gap:1.4vh;
  padding:0 6vw calc(2.4vh + env(safe-area-inset-bottom,0px));
  z-index:20;
  opacity:0; transition:opacity .5s ease;
}
.controls.ready{ opacity:1; }
.dots{ display:flex; gap:6px; flex-wrap:wrap; justify-content:center; max-width:80vw; }
.dot{
  width:8px; height:8px; border-radius:50%;
  background:rgba(255,220,180,.28);
  transition:background .3s ease, transform .3s ease;
}
.dot.on{ background:#ffcf8a; transform:scale(1.18); }
.next{
  appearance:none; border:none; cursor:pointer; font-family:var(--round);
  font-weight:800; letter-spacing:.02em; color:#4a261b;
  padding:.85em 1.9em; border-radius:999px;
  background:linear-gradient(180deg,#ffd89b,#f6a552);
  box-shadow:0 6px 18px rgba(180,90,40,.35), inset 0 1px 0 rgba(255,255,255,.55);
  transition:transform .12s ease, filter .2s ease;
  touch-action:manipulation;
}
.next:hover{ filter:brightness(1.05); }
.next:active{ transform:scale(.95); }
.next:focus-visible{ outline:3px solid #fff2d6; outline-offset:3px; }

/* ===================== MARCO + CORTINAS ===================== */
.frame-side{
  position:absolute; top:0; bottom:0; width:clamp(14px,3vw,30px); z-index:42;
  background:
    linear-gradient(90deg, rgba(255,220,170,.18), rgba(0,0,0,.25)),
    linear-gradient(180deg, var(--wood-1), var(--wood-2) 55%, var(--wood-3));
  box-shadow:0 0 18px rgba(0,0,0,.45);
}
.frame-l{ left:0; } .frame-r{ right:0; }

.curtain{
  position:absolute; top:0; bottom:0; width:56%; z-index:40;
  transition:transform 1.15s cubic-bezier(.7,0,.15,1);
  will-change:transform;
}
.curtain-l{
  left:0;
  background:repeating-linear-gradient(90deg,#6b1f2e 0px,#7d2536 22px,#5a1826 44px);
  box-shadow:inset -22px 0 44px rgba(0,0,0,.42);
}
.curtain-r{
  right:0;
  background:repeating-linear-gradient(90deg,#5a1826 0px,#7d2536 22px,#6b1f2e 44px);
  box-shadow:inset 22px 0 44px rgba(0,0,0,.42);
}
.theater.open .curtain-l{ transform:translateX(-88%); }
.theater.open .curtain-r{ transform:translateX(88%); }

.marquee{
  position:absolute; top:0; left:0; width:100%; z-index:43;
  height:clamp(30px,6vh,56px);
  display:flex; align-items:center; justify-content:center;
  background:
    linear-gradient(180deg, rgba(255,224,178,.22), rgba(0,0,0,.22)),
    linear-gradient(180deg, var(--wood-1), var(--wood-2) 60%, var(--wood-3));
  box-shadow:0 4px 14px rgba(0,0,0,.4);
  font-family:var(--serif); font-style:italic; font-weight:600;
  font-size:clamp(.8rem,2.6vw,1.15rem); letter-spacing:.14em;
  color:#ffe3ae; text-shadow:0 1px 0 rgba(0,0,0,.5);
}
.valance{
  position:absolute; top:clamp(30px,6vh,56px); left:0; width:100%;
  height:clamp(38px,7vh,72px); z-index:41;
}
.valance svg{ display:block; width:100%; height:100%; }

/* ===================== PANTALLA DE INICIO ===================== */
.start{
  position:absolute; inset:0; z-index:50;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2.2vh; text-align:center; padding:8vw; cursor:pointer;
  background:radial-gradient(circle at 50% 38%, rgba(40,20,50,.15), rgba(18,9,24,.78));
  -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px);
  transition:opacity .6s ease;
}
.start.hidden{ opacity:0; pointer-events:none; }
.start .eyebrow{
  font-family:var(--round); font-weight:700; letter-spacing:.34em;
  text-transform:uppercase; font-size:clamp(.7rem,2.8vw,.9rem);
  color:var(--text-soft); opacity:.9;
}
.start h1{
  margin:0; font-family:var(--serif); font-weight:500;
  font-size:clamp(1.9rem,7.5vw,3.6rem); line-height:1.05; color:var(--text);
  text-shadow:0 2px 20px rgba(40,10,20,.5);
}
.start .who{
  font-family:var(--serif); font-style:italic; font-weight:600;
  font-size:clamp(2.2rem,10vw,4.4rem); line-height:1;
  background:linear-gradient(92deg,#ffe0a8,#ffb37a 55%,#ff9d8a);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;
}
.start .hint{
  margin-top:1.5vh; font-family:var(--round); font-weight:700;
  font-size:clamp(.95rem,3.6vw,1.2rem); color:var(--text);
  animation:pulse 2.2s ease-in-out infinite;
}
@keyframes pulse{ 0%,100%{ opacity:.5; } 50%{ opacity:1; } }
.begin-btn{
  margin-top:.5vh;
  appearance:none; border:none; cursor:pointer; font-family:var(--round);
  font-weight:800; color:#4a261b; letter-spacing:.02em;
  padding:.9em 2.2em; border-radius:999px;
  background:linear-gradient(180deg,#ffe1ad,#f4a259);
  box-shadow:0 8px 22px rgba(180,90,40,.4), inset 0 1px 0 rgba(255,255,255,.6);
  transition:transform .12s ease, filter .2s ease;
  touch-action:manipulation;
}
.begin-btn:active{ transform:scale(.95); }
.begin-btn:focus-visible{ outline:3px solid #fff2d6; outline-offset:3px; }
.spark{ position:absolute; color:#ffe0a0; font-size:clamp(10px,2vw,16px); opacity:.1; animation:tw 3.4s ease-in-out infinite; }
@keyframes tw{ 0%,100%{ opacity:.08; transform:scale(.8);} 50%{ opacity:.85; transform:scale(1.12);} }

/* ===================== ACCESIBILIDAD ===================== */
@media (prefers-reduced-motion: reduce){
  .theater *{ animation-duration:.001s !important; animation-iteration-count:1 !important; }
  .puppet-rig{ transition-duration:.001s !important; }
  .caption{ transition-duration:.18s !important; }
  .curtain{ transition-duration:.4s !important; }
}
</style>
</head>

<body>
<div class="theater" id="theater">

  <!-- Fondo -->
  <div class="backdrop" id="backdrop">
    <div class="sky"></div>
    <div class="sun-glow"></div>
    <div class="sun-core"></div>
    <div class="hills">
      <svg viewBox="0 0 100 30" preserveAspectRatio="none">
        <path d="M0,30 L0,14 Q18,4 34,12 Q52,20 68,9 Q84,1 100,11 L100,30 Z" fill="#5e2b46"/>
        <path d="M0,30 L0,20 Q22,12 40,18 Q60,25 78,16 Q90,11 100,18 L100,30 Z" fill="#3d1d33"/>
      </svg>
    </div>
    <div class="floor"></div>
  </div>

  <!-- Contenido -->
  <div class="content">
    <div class="scene" id="scene">
      <div class="spotlight"></div>
      <div class="warmth"></div>
      <canvas class="fx" id="fx"></canvas>

      <div class="performers">

        <!-- TÍTERE A: el narrador (tú), con gafitas -->
        <div class="puppet-rig puppet-a character" id="puppetA">
          <div class="shadow"></div>
          <div class="rig-sway">

<script>
(function(){
  "use strict";
  var $ = function(s){ return document.querySelector(s); };

  var theater   = $('#theater');
  var scene     = $('#scene');
  var backdrop  = $('#backdrop');
  var puppetA   = $('#puppetA');
  var puppetB   = $('#puppetB');
  var propCake  = $('#propCake');
  var propGift  = $('#propGift');
  var caption   = $('#caption');
  var signature = $('#signature');
  var dotsWrap  = $('#dots');
  var nextBtn   = $('#nextBtn');
  var startScr  = $('#startScreen');
  var beginBtn  = $('#beginBtn');
  var controls  = document.querySelector('.controls');
  var canvas    = $('#fx');
  var ctx       = canvas.getContext('2d');
  var reduce    = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---- La obra: t = texto, a = ánimo títere A (tú), b = ánimo títere B (ella),
  //      enterB = ella baja al escenario en este paso, prop = utilería visible ----
  var steps = [
    { t:"Ésta es la historia de dos personas a las que un trabajo nuevo juntó.", a:"warm" },
    { t:"Te conocí de la nada, llegando al trabajo nuevo…",                      a:"curious", enterB:true, b:"warm" },
    { t:"…y nuestra primera charla fue que querías un aumento de sueldo.",       a:"playful", b:"playful" },
    { t:"Directa desde el día uno. Y eso, la verdad, me encantó.",              a:"warm", b:"laugh" },
    { t:"De ahí, verte cumplir tus 30 años…",                                   a:"celebrate", b:"celebrate", prop:"cake" },
    { t:"…y te pido perdón por darte un pastel de tres leches.",                a:"sheepish", b:"laugh", prop:"cake" },
    { t:"(Prometo que la intención era buena…)",                                a:"sheepish", b:"laugh", prop:"cake" },
    { t:"Luego darnos esos regalos, empezar a conocerte…",                      a:"warm", b:"warm", prop:"gift" },
    { t:"…las charlas, las risas, los días buenos y los no tan buenos.",        a:"warm", b:"grateful" },
    { t:"…y ya para este año te volviste mi apoyo incondicional.",              a:"grateful", b:"grateful" },
    { t:"Gracias por escucharme, por aguantarme, por estar ahí.",               a:"sincere", b:"warm" },
    { t:"Hoy quiero que sepas que esto no es un mensaje de «vuelve»…",          a:"sincere", b:"sincere" },
    { t:"…es un abrazo. Un gracias del tamaño del mundo.",                      a:"warm", b:"heart" },
    { t:"…es un regalo, de corazón, para ti.",                                 a:"heart", b:"heart" },
    { t:"Ve, sé feliz y cómete el mundo.",                                     a:"joy", b:"joy", final:true }
  ];

  // ---- Puntitos de progreso ----
  var dots = [];
  steps.forEach(function(){
    var d = document.createElement('span');
    d.className = 'dot';
    dotsWrap.appendChild(d);
    dots.push(d);
  });

  // ---- Luciérnagas ----
  var moteCount = reduce ? 0 : 12;
  for(var i=0;i<moteCount;i++){
    var m = document.createElement('span');
    m.className = 'mote';
    var size = 4 + Math.random()*6;
    m.style.left = (Math.random()*100) + '%';
    m.style.width = size + 'px';
    m.style.height = size + 'px';
    m.style.setProperty('--dx', (Math.random()*80 - 40) + 'px');
    var dur = 9 + Math.random()*8;
    m.style.animationDuration = dur + 's';
    m.style.animationDelay = (-Math.random()*dur) + 's';
    backdrop.appendChild(m);
  }

  var idx = -1, busy = false, started = false, bOnStage = false;
  var wait = function(ms){ return new Promise(function(r){ setTimeout(r, ms); }); };

  function voice(){ return document.getElementById('voz'); }
  function playVoice(){ var v=voice(); if(v){ try{ v.currentTime=0; if(v.play) v.play().catch(function(){}); }catch(e){} } }
  function stopVoice(){ var v=voice(); if(v){ try{ v.pause(); }catch(e){} } }

  function updateDots(){ for(var i=0;i<dots.length;i++){ dots[i].classList.toggle('on', i<=idx); } }

  function setProps(name){
    propCake.classList.toggle('show', name === 'cake');
    propGift.classList.toggle('show', name === 'gift');
  }

  function dropPuppet(rig){
    rig.classList.add('landing');
    requestAnimationFrame(function(){ rig.classList.add('entered'); });
    setTimeout(function(){ rig.classList.remove('landing'); }, reduce ? 80 : 2400);
  }

  function resetPuppet(rig){
    rig.classList.add('no-anim');
    rig.classList.remove('entered','landing');
    rig.removeAttribute('data-mood');
    void rig.offsetWidth;
    rig.classList.remove('no-anim');
  }

  function applyStep(i){
    idx = i;
    var s = steps[i];
    caption.textContent = s.t;
    caption.classList.toggle('final', !!s.final);
    puppetA.dataset.mood = s.a;
    if(s.enterB && !bOnStage){ bOnStage = true; dropPuppet(puppetB); }
    if(s.b && bOnStage){ puppetB.dataset.mood = s.b; }
    setProps(s.prop || null);
    updateDots();
    if(s.final){
      nextBtn.textContent = 'Repetir función ↺';
      signature.classList.add('show');
      scene.classList.add('finale');
      startFx();
    }
  }

  async function goTo(i){
    busy = true;
    caption.classList.remove('show');
    signature.classList.remove('show');
    await wait(reduce ? 40 : 330);
    var entering = !!steps[i].enterB && !bOnStage;
    applyStep(i);
    void caption.offsetWidth;
    caption.classList.add('show');
    // Si ella está bajando, esperamos a que aterrice antes de habilitar el botón
    await wait(reduce ? 40 : (entering ? 2450 : 360));
    busy = false;
  }

  async function begin(){
    if(started || busy) return;
    started = true; busy = true;
    playVoice();
    startScr.classList.add('hidden');
    await wait(reduce ? 20 : 220);
    theater.classList.add('open');
    await wait(reduce ? 20 : 850);
    puppetA.dataset.mood = 'warm';
    dropPuppet(puppetA);
    await wait(reduce ? 60 : 2450);
    controls.classList.add('ready');
    busy = false;
    goTo(0);
  }

  async function replay(){
    busy = true;
    stopFx();
    scene.classList.remove('finale');
    caption.classList.remove('show');
    signature.classList.remove('show');
    setProps(null);
    await wait(300);
    theater.classList.remove('open');
    await wait(reduce ? 60 : 950);
    resetPuppet(puppetA);
    resetPuppet(puppetB);
    bOnStage = false;
    idx = -1; updateDots();
    nextBtn.textContent = 'Siguiente ›';
    controls.classList.remove('ready');
    stopVoice();
    started = false;
    startScr.classList.remove('hidden');
    busy = false;
  }

  function advance(){
    if(busy) return;
    if(idx >= steps.length - 1) replay();
    else goTo(idx + 1);
  }

  nextBtn.addEventListener('click', advance);
  beginBtn.addEventListener('click', function(e){ e.stopPropagation(); begin(); });
  startScr.addEventListener('click', begin);
  startScr.addEventListener('keydown', function(e){
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); begin(); }
  });

  /* ---------------- Brasas del gran final (canvas) ---------------- */
  var parts = [], raf = null, emitting = false, emitUntil = 0, dpr = 1;

  function sizeCanvas(){
    var r = scene.getBoundingClientRect();
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width  = Math.max(1, Math.floor(r.width  * dpr));
    canvas.height = Math.max(1, Math.floor(r.height * dpr));
    canvas.style.width  = r.width  + 'px';
    canvas.style.height = r.height + 'px';
  }

  function spawn(){
    var colors = ['#ffd98a','#ffb877','#ff9d7a','#ffe6b0','#ffcf6a'];
    parts.push({
      x: canvas.width * (0.15 + Math.random()*0.7),
      y: canvas.height * (0.9 + Math.random()*0.12),
      vx: (Math.random()-0.5) * 0.5 * dpr,
      vy: -(0.6 + Math.random()*1.1) * dpr,
      r: (2 + Math.random()*3.5) * dpr,
      life: 0, ttl: 120 + Math.random()*80,
      c: colors[(Math.random()*colors.length)|0],
      sway: Math.random()*Math.PI*2
    });
  }

  function tick(t){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(emitting){
      if(t < emitUntil){ for(var s=0;s<3;s++) spawn(); }
      else emitting = false;
    }
    for(var i=parts.length-1;i>=0;i--){
      var p = parts[i];
      p.life++; p.sway += 0.05;
      p.x += p.vx + Math.sin(p.sway)*0.3*dpr;
      p.y += p.vy; p.vy += 0.004*dpr;
      var k = 1 - p.life/p.ttl;
      if(k <= 0 || p.y < -20){ parts.splice(i,1); continue; }
      ctx.globalAlpha = Math.max(0, Math.min(1, k)) * 0.9;
      ctx.fillStyle = p.c;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, 6.2832);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    if(parts.length > 0 || emitting){ raf = requestAnimationFrame(tick); }
    else { raf = null; }
  }

  function startFx(){
    if(reduce) return;
    sizeCanvas();
    emitting = true;
    emitUntil = performance.now() + 1900;
    if(!raf) raf = requestAnimationFrame(tick);
  }
  function stopFx(){
    emitting = false; parts = [];
    if(raf){ cancelAnimationFrame(raf); raf = null; }
    if(ctx) ctx.clearRect(0,0,canvas.width,canvas.height);
  }

  window.addEventListener('resize', function(){
    if(scene.classList.contains('finale')) sizeCanvas();
  });
})();
</script>
</body>
